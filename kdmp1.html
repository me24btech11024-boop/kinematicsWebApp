<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Kinematics Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background-color: #222; color: #fff; }
        
        #home-screen { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #1a1a1a; position: absolute; top: 0; left: 0; z-index: 100; transition: 0.3s; }
        #home-screen h1 { font-size: 36px; color: #4CAF50; margin-bottom: 10px; }
        #home-screen p { font-size: 20px; color: #aaa; margin-bottom: 40px; }
        .home-btn { background-color: #007BFF; color: white; border: none; padding: 20px 40px; font-size: 20px; margin: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; width: 350px; }
        .home-btn.green { background-color: #28A745; }
        .home-btn:hover { filter: brightness(1.2); transform: scale(1.05); }

        #app-screen { width: 100%; height: 100%; display: none; flex-direction: row; }
        #sidebar { width: 340px; background-color: #333; padding: 20px; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.5); z-index: 10; }
        #main { flex-grow: 1; position: relative; display: flex; flex-direction: column; }
        canvas { background-color: #111; width: 100%; height: 100%; display: block; }
        
        h2 { margin-top: 20px; color: #4CAF50; border-bottom: 2px solid #555; padding-bottom: 10px; }
        .back-btn { background: none; border: none; color: #64B5F6; font-size: 16px; cursor: pointer; padding: 0; font-weight: bold; margin-bottom: 10px; }
        .back-btn:hover { color: #bbdefb; text-decoration: underline; }
        
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #ccc; }
        .input-row { display: flex; align-items: center; gap: 10px; }
        .input-row input[type="range"] { flex-grow: 1; cursor: pointer; }
        .input-row input[type="number"] { width: 65px; background: #444; color: white; border: 1px solid #666; border-radius: 4px; padding: 5px; font-weight: bold; text-align: center; }
        
        #fourbar-controls, #slider-controls { display: none; }
        #fourbar-controls.active, #slider-controls.active { display: block; }
        hr { border-color: #555; margin: 20px 0; }
        
        #status { font-weight: bold; margin-top: 10px; padding: 10px; border-radius: 5px; text-align: center; }
        .status-good { background-color: rgba(76, 175, 80, 0.2); color: #4CAF50; border: 1px solid #4CAF50; }
        .status-bad { background-color: rgba(244, 67, 54, 0.2); color: #F44336; border: 1px solid #F44336; }

        .plot-btn { width: 100%; padding: 12px; background-color: #9C27B0; color: white; border: none; font-size: 16px; cursor: pointer; border-radius: 5px; margin-top: 10px; font-weight: bold; }
        .plot-btn:hover { background-color: #AB47BC; }

        #plot-modal { display: none; position: absolute; top: 5%; left: 5%; width: 90%; height: 90%; background: #f4f4f4; z-index: 50; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.8); flex-direction: column; overflow: hidden; }
        .modal-header { padding: 15px; background: #333; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { margin: 0; color: white; }
        .close-btn { background: #F44336; border: none; color: white; padding: 8px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        
        /* Updated layout to stack graphs nicely so we can fit the Coupler Curve */
        .graphs-container { display: flex; flex-direction: column; overflow-y: auto; height: 100%; width: 100%; padding: 20px; box-sizing: border-box; background: #e0e0e0;}
        .graph-box { width: 100%; height: 350px; margin-bottom: 20px; flex-shrink: 0; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); padding: 10px;}
    </style>
</head>
<body>

    <div id="home-screen">
        <h1>⚙️ Universal Kinematics Dashboard</h1>
        <p>Select a mechanism to simulate:</p>
        <button class="home-btn" onclick="openMech('fourbar')">Four-Bar Mechanism</button>
        <button class="home-btn green" onclick="openMech('slider')">Slider-Crank Mechanism</button>
    </div>

    <div id="app-screen">
        <div id="sidebar">
            <button class="back-btn" onclick="goHome()">⬅️ Back to Main Menu</button>
            <h2 id="mech-title">Controls</h2>
            
            <div id="status" class="status-good">Status: Grashof</div>
            <hr>

            <div id="fourbar-controls">
                <div class="control-group"><label>L1 (Ground)</label><div class="input-row"><input type="range" id="L1" min="1" max="25" step="0.5" value="8" oninput="sync('L1')"><input type="number" id="num-L1" value="8" step="0.5" oninput="sync('num-L1')"></div></div>
                <div class="control-group"><label>L2 (Crank)</label><div class="input-row"><input type="range" id="L2" min="1" max="25" step="0.5" value="3" oninput="sync('L2')"><input type="number" id="num-L2" value="3" step="0.5" oninput="sync('num-L2')"></div></div>
                <div class="control-group"><label>L3 (Coupler)</label><div class="input-row"><input type="range" id="L3" min="1" max="25" step="0.5" value="7" oninput="sync('L3')"><input type="number" id="num-L3" value="7" step="0.5" oninput="sync('num-L3')"></div></div>
                <div class="control-group"><label>L4 (Rocker)</label><div class="input-row"><input type="range" id="L4" min="1" max="25" step="0.5" value="6" oninput="sync('L4')"><input type="number" id="num-L4" value="6" step="0.5" oninput="sync('num-L4')"></div></div>
                <hr>
                <div class="control-group"><label>Coupler Ext Length</label><div class="input-row"><input type="range" id="CpL" min="0" max="25" step="0.5" value="4" oninput="sync('CpL')"><input type="number" id="num-CpL" value="4" step="0.5" oninput="sync('num-CpL')"></div></div>
                <div class="control-group"><label>Coupler Angle (deg)</label><div class="input-row"><input type="range" id="CpA" min="-180" max="180" step="5" value="45" oninput="sync('CpA')"><input type="number" id="num-CpA" value="45" step="5" oninput="sync('num-CpA')"></div></div>
            </div>

            <div id="slider-controls">
                <div class="control-group"><label>Crank Radius (r)</label><div class="input-row"><input type="range" id="R" min="1" max="25" step="0.5" value="3" oninput="sync('R')"><input type="number" id="num-R" value="3" step="0.5" oninput="sync('num-R')"></div></div>
                <div class="control-group"><label>Connecting Rod (L)</label><div class="input-row"><input type="range" id="L-sl" min="1" max="40" step="0.5" value="10" oninput="sync('L-sl')"><input type="number" id="num-L-sl" value="10" step="0.5" oninput="sync('num-L-sl')"></div></div>
                <div class="control-group"><label>Track Offset (e)</label><div class="input-row"><input type="range" id="E" min="-20" max="20" step="0.5" value="0" oninput="sync('E')"><input type="number" id="num-E" value="0" step="0.5" oninput="sync('num-E')"></div></div>
            </div>

            <hr>
            <div class="control-group">
                <label>Animation Speed</label>
                <div class="input-row">
                    <input type="range" id="speed" min="0" max="10" step="0.5" value="3" oninput="sync('speed')">
                    <input type="number" id="num-speed" value="3" step="0.5" oninput="sync('num-speed')">
                </div>
            </div>

            <button class="plot-btn" onclick="generatePlots()">📊 Generate Kinematic Plots</button>
        </div>

        <div id="main">
            <canvas id="simCanvas"></canvas>
            <div id="plot-modal">
                <div class="modal-header">
                    <h3>Kinematic Data Hub</h3>
                    <button class="close-btn" onclick="document.getElementById('plot-modal').style.display='none'">Close X</button>
                </div>
                <div class="graphs-container">
                    <div id="graph-trace" class="graph-box"></div>
                    <div id="graph-vel" class="graph-box"></div>
                    <div id="graph-acc" class="graph-box"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        let currentScale = 1; 
        let currentMech = 'fourbar';
        let theta = 0; 
        let direction = 1; 
        let tracePath = []; 
        let validAngles = []; // Saves all safe angles so we never go blank
        let isAnimating = false; 

        function resize() { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; if(isAnimating) calcTrace(); }
        window.addEventListener('resize', resize);

        function openMech(mech) {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            currentMech = mech;
            document.getElementById('fourbar-controls').classList.toggle('active', mech === 'fourbar');
            document.getElementById('slider-controls').classList.toggle('active', mech === 'slider');
            document.getElementById('mech-title').innerText = mech === 'fourbar' ? "Four-Bar Controls" : "Slider-Crank Controls";
            
            if (mech === 'fourbar') { sync('L1'); sync('L2'); sync('L3'); sync('L4'); }
            else { sync('R'); sync('L-sl'); sync('E'); }
            
            theta = 0; tracePath = []; validAngles = []; isAnimating = true;
            resize(); 
        }

        function goHome() {
            document.getElementById('home-screen').style.display = 'flex';
            document.getElementById('app-screen').style.display = 'none';
            document.getElementById('plot-modal').style.display = 'none';
            isAnimating = false; 
        }

        function sync(sourceId) {
            let baseId = sourceId.replace('num-', '');
            let slider = document.getElementById(baseId);
            let numBox = document.getElementById('num-' + baseId);
            if (sourceId.startsWith('num-')) slider.value = numBox.value;
            else numBox.value = slider.value;
            calcTrace();
        }

        function calcTrace() {
            tracePath = [];
            validAngles = []; // Reset safe zones
            let validCount = 0;

            if (currentMech === 'fourbar') {
                let l1 = parseFloat(document.getElementById('L1').value);
                let l2 = parseFloat(document.getElementById('L2').value);
                let l3 = parseFloat(document.getElementById('L3').value);
                let l4 = parseFloat(document.getElementById('L4').value);
                let cpL = parseFloat(document.getElementById('CpL').value);
                let cpA = parseFloat(document.getElementById('CpA').value) * (Math.PI / 180);

                let links = [l1, l2, l3, l4].sort((a, b) => a - b);
                let grashof = links[0] + links[3] <= links[1] + links[2];
                let statDiv = document.getElementById('status');
                statDiv.innerText = grashof ? "Status: Grashof (Continuous)" : "Status: Non-Grashof (Rocker)";
                statDiv.className = grashof ? "status-good" : "status-bad";

                for (let t = 0; t < Math.PI * 2; t += 0.02) { 
                    let ax = l2 * Math.cos(t), ay = l2 * Math.sin(t);
                    let dist = Math.sqrt(Math.pow(l1 - ax, 2) + Math.pow(-ay, 2));
                    if (dist <= l3 + l4 && dist >= Math.abs(l3 - l4)) {
                        let phi1 = Math.atan2(-ay, l1 - ax);
                        let phi2 = Math.acos((l3*l3 + dist*dist - l4*l4) / (2 * l3 * dist));
                        let th3 = phi1 - phi2;
                        tracePath.push({ x: ax + cpL * Math.cos(th3 + cpA), y: ay + cpL * Math.sin(th3 + cpA) });
                        validAngles.push(t); // Map the safe zone
                        validCount++;
                    }
                }
            } else {
                let r = parseFloat(document.getElementById('R').value);
                let l = parseFloat(document.getElementById('L-sl').value);
                let e = parseFloat(document.getElementById('E').value);
                
                let statDiv = document.getElementById('status');
                if (l < r + Math.abs(e)) {
                    statDiv.innerText = "Error: Rod too short!"; statDiv.className = "status-bad";
                } else {
                    statDiv.innerText = "Status: Valid Configuration"; statDiv.className = "status-good";
                }
                for (let t = 0; t < Math.PI * 2; t += 0.02) {
                    let ay = r * Math.sin(t);
                    if (l >= Math.abs(e - ay)) {
                        tracePath.push(true);
                        validAngles.push(t);
                        validCount++;
                    }
                }
            }

            if (validCount === 0) {
                document.getElementById('status').innerText = "ERROR: Cannot Assemble!";
                document.getElementById('status').className = "status-bad";
            }
        }

        function getDerivative(yArray, dx) {
            let dy = [];
            for(let i = 0; i < yArray.length; i++) {
                if(i === 0) dy.push((yArray[1] - yArray[0]) / dx);
                else if(i === yArray.length - 1) dy.push((yArray[i] - yArray[i-1]) / dx);
                else dy.push((yArray[i+1] - yArray[i-1]) / (2 * dx));
            }
            return dy;
        }

        function unwrap(angles) {
            let res = [angles[0]];
            for(let i = 1; i < angles.length; i++) {
                let diff = angles[i] - angles[i-1];
                if (diff > Math.PI) diff -= 2 * Math.PI;
                if (diff < -Math.PI) diff += 2 * Math.PI;
                res.push(res[i-1] + diff);
            }
            return res;
        }

        function generatePlots() {
            if(document.getElementById('status').innerText.includes("ERROR")) return alert("Mechanism is broken. Fix dimensions first.");

            let xData = [], yVel = [], yAcc = [];
            let pxArray = [], pyArray = []; // Tracing Coupler X and Y
            let titleVel = "", titleAcc = "";
            let dx = 0.05; 

            if (currentMech === 'fourbar') {
                let l1 = parseFloat(document.getElementById('L1').value);
                let l2 = parseFloat(document.getElementById('L2').value);
                let l3 = parseFloat(document.getElementById('L3').value);
                let l4 = parseFloat(document.getElementById('L4').value);
                let cpL = parseFloat(document.getElementById('CpL').value);
                let cpA = parseFloat(document.getElementById('CpA').value) * (Math.PI / 180);
                
                let th4_array = [];
                for (let t = 0; t <= Math.PI * 2; t += dx) {
                    let ax = l2 * Math.cos(t), ay = l2 * Math.sin(t);
                    let dist = Math.sqrt(Math.pow(l1 - ax, 2) + Math.pow(-ay, 2));
                    if (dist <= l3 + l4 && dist >= Math.abs(l3 - l4)) {
                        let phi1 = Math.atan2(-ay, l1 - ax);
                        let phi2 = Math.acos((l3*l3 + dist*dist - l4*l4) / (2 * l3 * dist));
                        let th3 = phi1 - phi2;
                        let bx = ax + l3 * Math.cos(th3), by = ay + l3 * Math.sin(th3);
                        let th4 = Math.atan2(by, bx - l1);
                        
                        // Capture Coupler Data
                        pxArray.push(ax + cpL * Math.cos(th3 + cpA));
                        pyArray.push(ay + cpL * Math.sin(th3 + cpA));

                        xData.push(t * (180 / Math.PI)); 
                        th4_array.push(th4);
                    }
                }
                
                th4_array = unwrap(th4_array);
                yVel = getDerivative(th4_array, dx);
                yAcc = getDerivative(yVel, dx);
                titleVel = "Rocker Angular Velocity (ω4)";
                titleAcc = "Rocker Angular Acceleration (α4)";

                // Plot the specific Coupler Trace path
                document.getElementById('graph-trace').style.display = "block";
                let traceCoupler = { x: pxArray, y: pyArray, mode: 'lines', line: {color: 'cyan', width: 2} };
                let layoutTrace = { title: "Coupler Exact Value Trace (Y vs X)", xaxis: {title: 'X Coordinate'}, yaxis: {title: 'Y Coordinate', scaleanchor: 'x'}, margin: {t:40, b:40, l:40, r:20} };
                Plotly.newPlot('graph-trace', [traceCoupler], layoutTrace, {responsive: true});

            } else if (currentMech === 'slider') {
                let r = parseFloat(document.getElementById('R').value);
                let l = parseFloat(document.getElementById('L-sl').value);
                let e = parseFloat(document.getElementById('E').value);

                document.getElementById('graph-trace').style.display = "none"; // Hide trace graph for slider

                let xB_array = [];
                for (let t = 0; t <= Math.PI * 2; t += dx) {
                    let ay = r * Math.sin(t);
                    if (l >= Math.abs(e - ay)) {
                        let ax = r * Math.cos(t);
                        let th3 = Math.asin((e - ay) / l);
                        xB_array.push(ax + l * Math.cos(th3));
                        xData.push(t * (180 / Math.PI));
                    }
                }

                yVel = getDerivative(xB_array, dx);
                yAcc = getDerivative(yVel, dx);
                titleVel = "Slider Linear Velocity (v_B)";
                titleAcc = "Slider Linear Acceleration (a_B)";
            }

            document.getElementById('plot-modal').style.display = 'flex';
            let traceVel = { x: xData, y: yVel, mode: 'lines', line: {color: 'blue', width: 2} };
            let layoutVel = { title: titleVel, xaxis: {title: 'Crank Angle (deg)'}, margin: {t:40, b:40, l:40, r:20} };
            Plotly.newPlot('graph-vel', [traceVel], layoutVel, {responsive: true});

            let traceAcc = { x: xData, y: yAcc, mode: 'lines', line: {color: 'red', width: 2} };
            let layoutAcc = { title: titleAcc, xaxis: {title: 'Crank Angle (deg)'}, margin: {t:40, b:40, l:40, r:20} };
            Plotly.newPlot('graph-acc', [traceAcc], layoutAcc, {responsive: true});
        }

        function drawLine(x1, y1, x2, y2, color, pixelWidth) {
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
            ctx.strokeStyle = color; ctx.lineWidth = pixelWidth / currentScale; 
            ctx.lineCap = 'round'; ctx.stroke();
        }
        function drawJoint(x, y, color) {
            ctx.beginPath(); ctx.arc(x, y, 5 / currentScale, 0, Math.PI * 2); 
            ctx.fillStyle = color; ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5 / currentScale; ctx.stroke();
        }

        function animate() {
            if (!isAnimating) { requestAnimationFrame(animate); return; }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let statText = document.getElementById('status').innerText;
            
            // Draw impossible geometry warning directly on screen instead of crashing
            if (statText.includes("ERROR")) {
                ctx.fillStyle = "#F44336";
                ctx.font = "bold 24px Arial";
                ctx.textAlign = "center";
                ctx.fillText("⚠️ Impossible Geometry: Cannot Assemble", canvas.width / 2, canvas.height / 2);
                requestAnimationFrame(animate); return;
            }

            let speed = parseFloat(document.getElementById('speed').value) * 0.02;
            
            ctx.save();
            currentScale = Math.min(canvas.width, canvas.height) / 40; 
            ctx.translate(canvas.width / 2 - (currentScale * 5), canvas.height / 2);
            ctx.scale(currentScale, -currentScale); 

            if (currentMech === 'fourbar') {
                let l1 = parseFloat(document.getElementById('L1').value);
                let l2 = parseFloat(document.getElementById('L2').value);
                let l3 = parseFloat(document.getElementById('L3').value);
                let l4 = parseFloat(document.getElementById('L4').value);
                let cpL = parseFloat(document.getElementById('CpL').value);
                let cpA = parseFloat(document.getElementById('CpA').value) * (Math.PI / 180);

                // SNAP-TO-SAFE ZONE MATH
                // If you input a number that puts you in a broken spot, teleport to the nearest safe angle
                let currentDist = Math.hypot(l1 - l2 * Math.cos(theta), -l2 * Math.sin(theta));
                if (currentDist > l3 + l4 || currentDist < Math.abs(l3 - l4)) {
                    if (validAngles.length > 0) {
                        theta = validAngles[Math.floor(validAngles.length / 2)]; // Teleport safely inside limits
                    }
                }

                // Lookahead Math
                let nextTheta = theta + (speed * direction);
                let nAx = l2 * Math.cos(nextTheta), nAy = l2 * Math.sin(nextTheta);
                let nDist = Math.hypot(l1 - nAx, -nAy);

                if (nDist > l3 + l4 || nDist < Math.abs(l3 - l4)) {
                    direction *= -1; 
                    nextTheta = theta + (speed * direction);
                }
                theta = nextTheta;

                let ax = l2 * Math.cos(theta), ay = l2 * Math.sin(theta);
                let dist = Math.hypot(l1 - ax, -ay);

                if (dist <= l3 + l4 && dist >= Math.abs(l3 - l4)) {
                    let phi1 = Math.atan2(-ay, l1 - ax);
                    let phi2 = Math.acos((l3*l3 + dist*dist - l4*l4) / (2 * l3 * dist));
                    let th3 = phi1 - phi2;
                    let bx = ax + l3 * Math.cos(th3), by = ay + l3 * Math.sin(th3);
                    let px = ax + cpL * Math.cos(th3 + cpA), py = ay + cpL * Math.sin(th3 + cpA);

                    ctx.beginPath();
                    for (let i = 0; i < tracePath.length; i++) {
                        if (i === 0) {
                            ctx.moveTo(tracePath[i].x, tracePath[i].y);
                        } else {
                            let gap = Math.hypot(tracePath[i].x - tracePath[i-1].x, tracePath[i].y - tracePath[i-1].y);
                            if (gap > l2 * 0.5) ctx.moveTo(tracePath[i].x, tracePath[i].y);
                            else ctx.lineTo(tracePath[i].x, tracePath[i].y);
                        }
                    }
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.8)';
                    ctx.setLineDash([5 / currentScale, 5 / currentScale]);
                    ctx.lineWidth = 2 / currentScale; 
                    ctx.stroke();
                    ctx.setLineDash([]);

                    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.lineTo(px, py); ctx.closePath();
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.3)'; ctx.fill();

                    drawLine(0, 0, l1, 0, '#888', 6);
                    drawLine(0, 0, ax, ay, '#FF5252', 6);
                    drawLine(ax, ay, bx, by, '#4CAF50', 6);
                    drawLine(l1, 0, bx, by, '#2196F3', 6);

                    drawJoint(0, 0, '#888'); drawJoint(l1, 0, '#888');
                    drawJoint(ax, ay, '#FF5252'); drawJoint(bx, by, '#2196F3');
                    drawJoint(px, py, '#00FFFF');
                }

            } else if (currentMech === 'slider') {
                let r = parseFloat(document.getElementById('R').value);
                let l = parseFloat(document.getElementById('L-sl').value);
                let e = parseFloat(document.getElementById('E').value);

                let currentY = r * Math.sin(theta);
                if (l < Math.abs(e - currentY)) {
                    if (validAngles.length > 0) theta = validAngles[Math.floor(validAngles.length / 2)];
                }

                let nextTheta = theta + (speed * direction);
                let nAy = r * Math.sin(nextTheta);
                if (l < Math.abs(e - nAy)) {
                    direction *= -1;
                    nextTheta = theta + (speed * direction);
                }
                theta = nextTheta;
                let ax = r * Math.cos(theta), ay = r * Math.sin(theta);

                if (l >= Math.abs(e - ay)) {
                    let th3 = Math.asin((e - ay) / l);
                    let bx = ax + l * Math.cos(th3);

                    ctx.setLineDash([5 / currentScale, 5 / currentScale]);
                    drawLine(-r-l-5, e, r+l+5, e, '#555', 2);
                    ctx.setLineDash([]);

                    drawLine(0, 0, ax, ay, '#FF5252', 6);
                    drawLine(ax, ay, bx, e, '#4CAF50', 6);

                    ctx.fillStyle = 'rgba(33, 150, 243, 0.6)';
                    let blockW = 3, blockH = 2;
                    ctx.fillRect(bx - blockW/2, e - blockH/2, blockW, blockH);
                    ctx.strokeStyle = '#2196F3'; ctx.lineWidth = 2 / currentScale;
                    ctx.strokeRect(bx - blockW/2, e - blockH/2, blockW, blockH);

                    drawJoint(0, 0, '#888'); drawJoint(ax, ay, '#FF5252'); drawJoint(bx, e, '#2196F3');
                }
            }

            ctx.restore();
            requestAnimationFrame(animate); 
        }

        requestAnimationFrame(animate);
    </script>
</body>
