<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Kinematics Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background-color: #222; color: #fff; }
        
        #home-screen { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #1a1a1a; position: absolute; top: 0; left: 0; z-index: 100; transition: 0.3s; }
        #home-screen h1 { font-size: 42px; color: #4CAF50; margin-bottom: 10px; }
        #home-screen p { font-size: 22px; color: #aaa; margin-bottom: 40px; }
        .home-btn { background-color: #007BFF; color: white; border: none; padding: 25px 50px; font-size: 22px; margin: 15px; border-radius: 12px; cursor: pointer; transition: 0.2s; width: 400px; font-weight: bold; }
        .home-btn.green { background-color: #28A745; }
        .home-btn:hover { filter: brightness(1.2); transform: scale(1.05); }

        #app-screen { width: 100%; height: 100%; display: none; flex-direction: row; }
        
        #sidebar { width: 450px; background-color: #2a2a2a; padding: 30px; overflow-y: auto; box-shadow: 5px 0 15px rgba(0,0,0,0.8); z-index: 10; }
        #main { flex-grow: 1; position: relative; display: flex; flex-direction: column; }
        canvas { background-color: #111; width: 100%; height: 100%; display: block; }
        
        h2 { margin-top: 20px; color: #4CAF50; border-bottom: 2px solid #555; padding-bottom: 10px; font-size: 28px; }
        .back-btn { background: none; border: none; color: #64B5F6; font-size: 18px; cursor: pointer; padding: 0; font-weight: bold; margin-bottom: 15px; }
        .back-btn:hover { color: #bbdefb; text-decoration: underline; }
        
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 15px; color: #ddd; font-weight: bold; }
        .input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px;}
        .input-row input[type="range"] { flex-grow: 1; cursor: pointer; height: 8px; }
        .input-row input[type="number"] { width: 70px; background: #444; color: white; border: 1px solid #777; border-radius: 5px; padding: 6px; font-size: 14px; font-weight: bold; text-align: center; }
        
        #fourbar-controls, #slider-controls { display: none; }
        #fourbar-controls.active, #slider-controls.active { display: block; }
        hr { border-color: #555; margin: 20px 0; }
        
        #status { font-size: 16px; font-weight: bold; margin-top: 10px; padding: 12px; border-radius: 8px; text-align: center; }
        .status-good { background-color: rgba(76, 175, 80, 0.2); color: #4CAF50; border: 2px solid #4CAF50; }
        .status-warn { background-color: rgba(255, 193, 7, 0.2); color: #FFC107; border: 2px solid #FFC107; }
        .status-bad { background-color: rgba(244, 67, 54, 0.2); color: #F44336; border: 2px solid #F44336; }

        .plot-btn { width: 100%; padding: 15px; background-color: #9C27B0; color: white; border: none; font-size: 16px; cursor: pointer; border-radius: 8px; margin-top: 10px; font-weight: bold; transition: 0.2s; }
        .plot-btn:hover { background-color: #AB47BC; transform: translateY(-2px); }
        .vec-btn { background-color: #FF9800; }
        .vec-btn:hover { background-color: #FFA726; }

        .modal { display: none; position: absolute; top: 5%; left: 5%; width: 90%; height: 90%; background: #f4f4f4; z-index: 50; border-radius: 12px; box-shadow: 0 0 30px rgba(0,0,0,0.9); flex-direction: column; overflow: hidden; }
        .modal-header { padding: 15px 20px; background: #222; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #9C27B0; }
        .modal-header h3 { margin: 0; color: white; font-size: 22px; }
        .close-btn { background: #F44336; border: none; color: white; padding: 8px 15px; font-size: 14px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        
        .graphs-container { display: flex; flex-direction: column; overflow-y: auto; height: 100%; width: 100%; padding: 20px; box-sizing: border-box; background: #e0e0e0;}
        .graph-box { width: 100%; height: 350px; margin-bottom: 20px; flex-shrink: 0; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); padding: 10px;}
        
        .vector-canvases { display: flex; flex-direction: column; overflow-y: auto; height: 100%; width: 100%; padding: 20px; box-sizing: border-box; background: #e0e0e0; }
        .vector-pane { width: 100%; height: 500px; margin-bottom: 30px; flex-shrink: 0; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); padding: 15px; display: flex; flex-direction: column; position: relative;}
        .vector-pane h4 { text-align: center; color: #333; margin: 0 0 10px 0; font-size: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px;}
        .vector-pane canvas { background-color: #fff; width: 100%; flex-grow: 1; border: 1px solid #ccc; border-radius: 4px;}
        .legend { position: absolute; top: 60px; right: 30px; background: rgba(255,255,255,0.95); border: 1px solid #aaa; padding: 10px; font-size: 13px; color: #333; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); border-radius: 5px; z-index: 10; }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1>⚙️ Universal Kinematics Dashboard</h1>
        <p>Select a mechanism to simulate:</p>
        <button class="home-btn" onclick="openMech('fourbar')">Four-Bar Mechanism</button>
        <button class="home-btn green" onclick="openMech('slider')">Slider-Crank Mechanism</button>
    </div>

    <div id="app-screen">
        <div id="sidebar">
            <button class="back-btn" onclick="goHome()">⬅️ Back to Main Menu</button>
            <h2 id="mech-title">Controls</h2>
            
            <div id="status" class="status-good">Status: Grashof</div>
            <hr>

            <div id="fourbar-controls">
                <div class="control-group" style="background: #333; padding: 15px; border-radius: 8px; border: 1px solid #555;">
                    <label style="color: #64B5F6; text-align: center;">🔄 Select Ground Link (Inversion)</label>
                    <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                        <label style="color: #9E9E9E; cursor: pointer;"><input type="radio" name="ground-link" value="1" checked onchange="calcTrace()"> L1</label>
                        <label style="color: #FF5252; cursor: pointer;"><input type="radio" name="ground-link" value="2" onchange="calcTrace()"> L2</label>
                        <label style="color: #4CAF50; cursor: pointer;"><input type="radio" name="ground-link" value="3" onchange="calcTrace()"> L3</label>
                        <label style="color: #2196F3; cursor: pointer;"><input type="radio" name="ground-link" value="4" onchange="calcTrace()"> L4</label>
                    </div>
                </div>

                <div class="control-group"><label style="color: #9E9E9E;">L1 (Grey)</label><div class="input-row"><input type="range" id="L1" min="1" max="25" step="0.5" value="8" oninput="sync('L1')"><input type="number" id="num-L1" value="8" step="0.5" oninput="sync('num-L1')"></div></div>
                <div class="control-group"><label style="color: #FF5252;">L2 (Red - Crank/Driver)</label><div class="input-row"><input type="range" id="L2" min="1" max="25" step="0.5" value="3" oninput="sync('L2')"><input type="number" id="num-L2" value="3" step="0.5" oninput="sync('num-L2')"></div></div>
                <div class="control-group"><label style="color: #4CAF50;">L3 (Green - Coupler)</label><div class="input-row"><input type="range" id="L3" min="1" max="25" step="0.5" value="7" oninput="sync('L3')"><input type="number" id="num-L3" value="7" step="0.5" oninput="sync('num-L3')"></div></div>
                <div class="control-group"><label style="color: #2196F3;">L4 (Blue - Rocker)</label><div class="input-row"><input type="range" id="L4" min="1" max="25" step="0.5" value="6" oninput="sync('L4')"><input type="number" id="num-L4" value="6" step="0.5" oninput="sync('num-L4')"></div></div>
                <hr>
                <div class="control-group"><label>Coupler Ext Length</label><div class="input-row"><input type="range" id="CpL" min="0" max="25" step="0.5" value="4" oninput="sync('CpL')"><input type="number" id="num-CpL" value="4" step="0.5" oninput="sync('num-CpL')"></div></div>
                <div class="control-group"><label>Coupler Angle (deg)</label><div class="input-row"><input type="range" id="CpA" min="-180" max="180" step="5" value="45" oninput="sync('CpA')"><input type="number" id="num-CpA" value="45" step="5" oninput="sync('num-CpA')"></div></div>
            </div>

            <div id="slider-controls">
                <div class="control-group" style="background: #333; padding: 15px; border-radius: 8px; border: 1px solid #555;">
                    <label style="color: #64B5F6; text-align: center;">🔄 Select Ground Link (Inversion)</label>
                    <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                        <label style="color: #9E9E9E; cursor: pointer;"><input type="radio" name="sl-ground-link" value="1" checked onchange="calcTrace()"> Track</label>
                        <label style="color: #FF5252; cursor: pointer;"><input type="radio" name="sl-ground-link" value="2" onchange="calcTrace()"> Crank</label>
                        <label style="color: #4CAF50; cursor: pointer;"><input type="radio" name="sl-ground-link" value="3" onchange="calcTrace()"> Rod</label>
                        <label style="color: #2196F3; cursor: pointer;"><input type="radio" name="sl-ground-link" value="4" onchange="calcTrace()"> Slider</label>
                    </div>
                </div>
                <div class="control-group"><label style="color: #FF5252;">Crank Radius (r)</label><div class="input-row"><input type="range" id="R" min="1" max="25" step="0.5" value="3" oninput="sync('R')"><input type="number" id="num-R" value="3" step="0.5" oninput="sync('num-R')"></div></div>
                <div class="control-group"><label style="color: #4CAF50;">Connecting Rod (L)</label><div class="input-row"><input type="range" id="L-sl" min="1" max="40" step="0.5" value="10" oninput="sync('L-sl')"><input type="number" id="num-L-sl" value="10" step="0.5" oninput="sync('num-L-sl')"></div></div>
            </div>

            <hr>
            <div class="control-group" style="background: #424242; padding: 10px; border-radius: 8px;">
                <label style="color: #FFB300;">📐 Static Vector Inputs</label>
                <div class="input-row"><label style="width: 80px;">θ₂ (deg):</label><input type="number" id="in_th2" value="30"></div>
                <div class="input-row"><label style="width: 80px;">ω₂ (rad/s):</label><input type="number" id="in_w2" value="3.0"></div>
                <div class="input-row"><label style="width: 80px;">α₂ (rad/s²):</label><input type="number" id="in_a2" value="6.0"></div>
                <button class="plot-btn vec-btn" onclick="openVectorModal()">Show Vector Diagrams</button>
            </div>

            <div class="control-group">
                <label>Animation Speed</label>
                <div class="input-row"><input type="range" id="speed" min="0" max="10" step="0.5" value="3" oninput="sync('speed')"><input type="number" id="num-speed" value="3" step="0.5" oninput="sync('num-speed')"></div>
            </div>

            <button class="plot-btn" onclick="generatePlots()">📊 Plot Kinematic Graphs</button>
        </div>

        <div id="main">
            <canvas id="simCanvas"></canvas>
            
            <div id="plot-modal" class="modal">
                <div class="modal-header">
                    <h3>Kinematic Data Plots</h3>
                    <button class="close-btn" onclick="document.getElementById('plot-modal').style.display='none'">Close X</button>
                </div>
                <div class="graphs-container">
                    <div id="graph-trace" class="graph-box"></div>
                    <div id="graph-vel" class="graph-box"></div>
                    <div id="graph-acc" class="graph-box"></div>
                </div>
            </div>

            <div id="vector-modal" class="modal">
                <div class="modal-header" style="border-bottom: 4px solid #FF9800;">
                    <h3 id="vector-title">Vector Diagrams</h3>
                    <button class="close-btn" onclick="document.getElementById('vector-modal').style.display='none'">Close X</button>
                </div>
                <div class="vector-canvases">
                    <div class="vector-pane">
                        <h4>Position Diagram</h4>
                        <canvas id="posCanvas"></canvas>
                    </div>
                    <div class="vector-pane">
                        <h4>Velocity Polygon</h4>
                        <canvas id="velCanvas"></canvas>
                    </div>
                    <div class="vector-pane">
                        <h4>Acceleration Polygon</h4>
                        <div class="legend">
                            <b>Legend:</b><br>
                            - - - Normal Comp (a^n)<br>
                            ······· Tangential Comp (a^t)<br>
                            ▬▬ Total Vector
                        </div>
                        <canvas id="accCanvas"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const posCanvas = document.getElementById('posCanvas');
        const posCtx = posCanvas.getContext('2d');
        const velCanvas = document.getElementById('velCanvas');
        const velCtx = velCanvas.getContext('2d');
        const accCanvas = document.getElementById('accCanvas');
        const accCtx = accCanvas.getContext('2d');
        
        let currentScale = 1; 
        let currentMech = 'fourbar';
        let theta = 0; 
        let direction = 1; 
        let tracePath = []; 
        let validAngles = []; 
        let isAnimating = false; 

        function resize() { 
            canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; 
            posCanvas.width = posCanvas.clientWidth; posCanvas.height = posCanvas.clientHeight;
            velCanvas.width = velCanvas.clientWidth; velCanvas.height = velCanvas.clientHeight;
            accCanvas.width = accCanvas.clientWidth; accCanvas.height = accCanvas.clientHeight;
            if(isAnimating) calcTrace(); 
        }
        window.addEventListener('resize', resize);

        function openMech(mech) {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            currentMech = mech;
            document.getElementById('fourbar-controls').classList.toggle('active', mech === 'fourbar');
            document.getElementById('slider-controls').classList.toggle('active', mech === 'slider');
            document.getElementById('mech-title').innerText = mech === 'fourbar' ? "Four-Bar Controls" : "Slider-Crank Controls";
            
            if (mech === 'fourbar') { sync('L1'); sync('L2'); sync('L3'); sync('L4'); }
            else { sync('R'); sync('L-sl'); }
            
            theta = 0; tracePath = []; validAngles = []; isAnimating = true;
            setTimeout(resize, 100); 
        }

        function goHome() {
            document.getElementById('home-screen').style.display = 'flex';
            document.getElementById('app-screen').style.display = 'none';
            document.getElementById('plot-modal').style.display = 'none';
            document.getElementById('vector-modal').style.display = 'none';
            isAnimating = false; 
        }

        function sync(sourceId) {
            let baseId = sourceId.replace('num-', '');
            let slider = document.getElementById(baseId);
            let numBox = document.getElementById('num-' + baseId);
            if (sourceId.startsWith('num-')) slider.value = numBox.value;
            else numBox.value = slider.value;
            if(baseId !== 'speed') calcTrace();
        }

        function getMappedLengths() {
            let L1 = parseFloat(document.getElementById('L1').value);
            let L2 = parseFloat(document.getElementById('L2').value);
            let L3 = parseFloat(document.getElementById('L3').value);
            let L4 = parseFloat(document.getElementById('L4').value);
            let minVal = Math.min(L1, L2, L3, L4);
            let shortestId = (minVal === L1) ? 1 : (minVal === L2) ? 2 : (minVal === L3) ? 3 : 4;
            let ground = document.querySelector('input[name="ground-link"]:checked').value;
            
            if (ground === "1") return { l1: L1, l2: L2, l3: L3, l4: L4, id1: 1, id2: 2, id3: 3, id4: 4, shortestId };
            if (ground === "2") return { l1: L2, l2: L3, l3: L4, l4: L1, id1: 2, id2: 3, id3: 4, id4: 1, shortestId };
            if (ground === "3") return { l1: L3, l2: L4, l3: L1, l4: L2, id1: 3, id2: 4, id3: 1, id4: 2, shortestId };
            if (ground === "4") return { l1: L4, l2: L1, l3: L2, l4: L3, id1: 4, id2: 1, id3: 2, id4: 3, shortestId };
        }

        function calcTrace() {
            tracePath = []; validAngles = []; 
            let validCount = 0;
            let statDiv = document.getElementById('status');

            if (currentMech === 'fourbar') {
                let { l1, l2, l3, l4 } = getMappedLengths(); 
                let cpL = parseFloat(document.getElementById('CpL').value);
                let cpA = parseFloat(document.getElementById('CpA').value) * (Math.PI / 180);

                let links = [l1, l2, l3, l4].sort((a, b) => a - b);
                let S = links[0], L = links[3], P = links[1], Q = links[2];
                
                if (L > S + P + Q) { statDiv.innerText = "Status: Geometry Error"; statDiv.className = "status-bad"; } 
                else if (Math.abs(L - (S + P + Q)) < 0.01) { statDiv.innerText = "Status: Boundary Condition (L = S + P + Q)"; statDiv.className = "status-warn"; } 
                else if (Math.abs((S + L) - (P + Q)) < 0.01) { statDiv.innerText = "Status: Special Grashof (Change Point)"; statDiv.className = "status-warn"; } 
                else if (S + L < P + Q) { statDiv.innerText = "Status: Grashof (Continuous)"; statDiv.className = "status-good"; } 
                else { statDiv.innerText = "Status: Non-Grashof (Rocker)"; statDiv.className = "status-bad"; }

                for (let t = 0; t < Math.PI * 2; t += 0.02) { 
                    let ax = l2 * Math.cos(t), ay = l2 * Math.sin(t);
                    let dist = Math.sqrt(Math.pow(l1 - ax, 2) + Math.pow(-ay, 2));
                    if (dist <= l3 + l4 && dist >= Math.abs(l3 - l4)) {
                        let phi1 = Math.atan2(-ay, l1 - ax);
                        let phi2 = Math.acos((l3*l3 + dist*dist - l4*l4) / (2 * l3 * dist));
                        let th3 = phi1 - phi2;
                        tracePath.push({ x: ax + cpL * Math.cos(th3 + cpA), y: ay + cpL * Math.sin(th3 + cpA) });
                        validAngles.push(t); validCount++;
                    }
                }
            } else {
                let r = parseFloat(document.getElementById('R').value);
                let l = parseFloat(document.getElementById('L-sl').value);
                let inv = document.querySelector('input[name="sl-ground-link"]:checked').value;
                if (l < r) { statDiv.innerText = "Error: Rod must be longer than Crank!"; statDiv.className = "status-bad"; } 
                else { statDiv.innerText = "Status: Valid Configuration"; statDiv.className = "status-good"; }
                
                if (l >= r) {
                    for (let t = 0; t <= Math.PI * 2; t += 0.02) {
                        let px, py;
                        if (inv === "1") { px = r * Math.cos(t); py = r * Math.sin(t); }
                        else if (inv === "2") { let d = r * Math.cos(t) + Math.sqrt(l*l - r*r * Math.pow(Math.sin(t), 2)); px = d * Math.cos(t); py = d * Math.sin(t); }
                        else if (inv === "3") { px = r * Math.cos(t); py = r * Math.sin(t); }
                        else if (inv === "4") { let d = -r * Math.cos(t) + Math.sqrt(l*l - r*r * Math.pow(Math.sin(t), 2)); px = d + r * Math.cos(t); py = r * Math.sin(t); }
                        tracePath.push({x: px, y: py}); validAngles.push(t); validCount++;
                    }
                }
            }
        }

        // --- DYNAMIC AXIS & VECTOR SCALING LOGIC ---
        function createCoordinateMapper(w, h, points) {
            let minX = 0, maxX = 0, minY = 0, maxY = 0;
            if (points.length > 0) {
                minX = Math.min(...points.map(p => p.x));
                maxX = Math.max(...points.map(p => p.x));
                minY = Math.min(...points.map(p => p.y));
                maxY = Math.max(...points.map(p => p.y));
            }
            // Always include origin 0,0
            minX = Math.min(minX, 0); maxX = Math.max(maxX, 0);
            minY = Math.min(minY, 0); maxY = Math.max(maxY, 0);

            let rangeX = Math.max(maxX - minX, 0.001);
            let rangeY = Math.max(maxY - minY, 0.001);
            
            // 80% padding so things don't touch edges
            let scale = 0.8 * Math.min(w / rangeX, h / rangeY);
            let cx = (minX + maxX) / 2;
            let cy = (minY + maxY) / 2;

            return {
                mapX: (x) => w/2 + (x - cx) * scale,
                mapY: (y) => h/2 - (y - cy) * scale, // Y axis flips conventionally here
                scale: scale, minX, maxX, minY, maxY, rangeX, rangeY
            };
        }

        function drawSmartGrid(ctx, w, h, map) {
            ctx.clearRect(0, 0, w, h);
            
            // Calculate a clean grid step size (powers of 10)
            let maxRange = Math.max(map.rangeX, map.rangeY);
            let order = Math.floor(Math.log10(maxRange));
            let step = Math.pow(10, order);
            if (maxRange / step < 3) step /= 5;
            else if (maxRange / step < 6) step /= 2;

            ctx.strokeStyle = '#e8e8e8';
            ctx.fillStyle = '#666';
            ctx.font = '11px Arial';
            ctx.lineWidth = 1;

            // Draw X grid lines
            let startX = Math.floor(map.minX / step) * step;
            for (let x = startX; x <= map.maxX + step; x += step) {
                let px = map.mapX(x);
                ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, h); ctx.stroke();
                if(Math.abs(x) > 1e-5) ctx.fillText(parseFloat(x.toPrecision(3)), px + 5, map.mapY(0) + 15);
            }

            // Draw Y grid lines
            let startY = Math.floor(map.minY / step) * step;
            for (let y = startY; y <= map.maxY + step; y += step) {
                let py = map.mapY(y);
                ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(w, py); ctx.stroke();
                if(Math.abs(y) > 1e-5) ctx.fillText(parseFloat(y.toPrecision(3)), map.mapX(0) + 5, py - 5);
            }

            // Draw Main Axes
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, map.mapY(0)); ctx.lineTo(w, map.mapY(0)); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(map.mapX(0), 0); ctx.lineTo(map.mapX(0), h); ctx.stroke(); 
            ctx.fillText("0", map.mapX(0) + 5, map.mapY(0) + 15);
        }

        function drawMappedArrow(ctx, map, x1, y1, x2, y2, color, label, dashPattern = []) {
            let px1 = map.mapX(x1), py1 = map.mapY(y1);
            let px2 = map.mapX(x2), py2 = map.mapY(y2);
            
            let headlen = 12; 
            let dx = px2 - px1, dy = py2 - py1;
            if(Math.hypot(dx,dy) < 2) return; 
            let angle = Math.atan2(dy, dx);
            
            ctx.beginPath(); ctx.moveTo(px1, py1); ctx.lineTo(px2, py2);
            ctx.strokeStyle = color; ctx.lineWidth = 2.5; 
            ctx.setLineDash(dashPattern); ctx.stroke(); ctx.setLineDash([]); 
            
            ctx.beginPath(); ctx.moveTo(px2, py2);
            ctx.lineTo(px2 - headlen * Math.cos(angle - Math.PI / 6), py2 - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(px2 - headlen * Math.cos(angle + Math.PI / 6), py2 - headlen * Math.sin(angle + Math.PI / 6));
            ctx.lineTo(px2, py2); ctx.fillStyle = color; ctx.fill();
            
            ctx.font = "bold 13px Arial";
            let tw = ctx.measureText(label).width;
            let tx = px1 + dx/2 + 8, ty = py1 + dy/2;
            
            ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
            ctx.fillRect(tx - 3, ty - 12, tw + 6, 16);
            ctx.fillStyle = "#222"; 
            ctx.fillText(label, tx, ty);
        }

        function openVectorModal() {
            if(document.getElementById('status').innerText.includes("Error")) return alert("Mechanism broken.");
            
            document.getElementById('vector-modal').style.display = 'flex';
            resize();

                    document.getElementById('vector-modal').style.display = 'none';
                    return alert("Given θ₂ cannot be assembled in this configuration.");
                }
                let phi1 = Math.atan2(-ay, l1 - ax), phi2 = Math.acos((l3*l3 + dist*dist - l4*l4) / (2 * l3 * dist));
                let th3 = phi1 - phi2;
                let bx = ax + l3 * Math.cos(th3), by = ay + l3 * Math.sin(th3);
                let th4 = Math.atan2(by, bx - l1);

                let posPoints = [ {x:0,y:0}, {x:l1, y:0}, {x:ax, y:ay}, {x:bx, y:by} ];

                // VELOCITY
                let V_A_mag = l2 * w2, V_A_ang = th2 + Math.PI/2;
                let det = l3 * l4 * Math.sin(th3 - th4);
                let w3 = (l2 * w2 * Math.sin(th4 - th2)) / det, w4 = (l2 * w2 * Math.sin(th3 - th2)) / det;
                let V_BA_mag = l3 * w3, V_BA_ang = th3 + Math.PI/2;
                let V_B_mag = l4 * w4,  V_B_ang = th4 + Math.PI/2;

                let vaX = V_A_mag * Math.cos(V_A_ang), vaY = V_A_mag * Math.sin(V_A_ang);

                drawMappedArrow(velCtx, mapVel, vaX, vaY, vbX, vbY, "green", "Vba");
                drawMappedArrow(velCtx, mapVel, 0, 0, vbX, vbY, "blue", "Vb");

                // ACCELERATION
                let An_A_mag = l2 * w2*w2, An_A_ang = th2 + Math.PI;
                let At_A_mag = l2 * a2,    At_A_ang = th2 + Math.PI/2;
                let An_BA_mag = l3 * w3*w3, An_BA_ang = th3 + Math.PI;
                let An_B_mag = l4 * w4*w4,  An_B_ang = th4 + Math.PI;

                let A_A_x = An_A_mag*Math.cos(An_A_ang) + At_A_mag*Math.cos(At_A_ang);
                let A_A_y = An_A_mag*Math.sin(An_A_ang) + At_A_mag*Math.sin(At_A_ang);
                let rhs_x = A_A_x + An_BA_mag*Math.cos(An_BA_ang) - An_B_mag*Math.cos(An_B_ang);
                let rhs_y = A_A_y + An_BA_mag*Math.sin(An_BA_ang) - An_B_mag*Math.sin(An_B_ang);
                let a3 = (rhs_x * Math.cos(th4 + Math.PI/2) + rhs_y * Math.sin(th4 + Math.PI/2)) / Math.sin(th3 - th4) / l3;
                let a4 = (rhs_x * Math.cos(th3 + Math.PI/2) + rhs_y * Math.sin(th3 + Math.PI/2)) / Math.sin(th3 - th4) / l4;

                let At_BA_mag = Math.abs(l3*a3), At_BA_ang = th3 + (a3>0 ? Math.PI/2 : -Math.PI/2);
                let At_B_mag = Math.abs(l4*a4),  At_B_ang = th4 + (a4>0 ? Math.PI/2 : -Math.PI/2);

                let p_O = {x:0, y:0};
                let p_An_A = {x: An_A_mag*Math.cos(An_A_ang), y: An_A_mag*Math.sin(An_A_ang)};

                drawMappedArrow(accCtx, mapAcc, p_A.x, p_A.y, p_An_BA.x, p_An_BA.y, "green", "aBA^n", [6, 4]);
                drawMappedArrow(accCtx, mapAcc, p_An_BA.x, p_An_BA.y, p_B.x, p_B.y, "green", "aBA^t", [2, 3]);
                drawMappedArrow(accCtx, mapAcc, p_A.x, p_A.y, p_B.x, p_B.y, "green", "aBA");

                drawMappedArrow(accCtx, mapAcc, p_An_B.x, p_An_B.y, p_B.x, p_B.y, "blue", "aB^t", [2, 3]);
                drawMappedArrow(accCtx, mapAcc, p_O.x, p_O.y, p_B.x, p_B.y, "blue", "aB");

            } else {

                // POSITION

                let p_r2x = r*Math.cos(th2), p_r2y = r*Math.sin(th2);

                drawMappedArrow(posCtx, mapPos, 0, 0, p_r2x, p_r2y, "#FF5252", "r2");
                drawMappedArrow(posCtx, mapPos, p_r2x, p_r2y, d, 0, "#4CAF50", "r3");

                // VELOCITY
                let Va_mag = r * w2, Va_ang = th2 + Math.PI/2;
                let w3 = (-r * w2 * Math.cos(th2)) / (l * Math.cos(th3));
                let Vb_mag = -r * w2 * Math.sin(th2) - l * w3 * Math.sin(th3);
                
                let vaX = Va_mag * Math.cos(Va_ang), vaY = Va_mag * Math.sin(Va_ang);
                let vbX = Vb_mag, vbY = 0;
                
                let velPoints = [{x:0,y:0}, {x:vaX, y:vaY}, {x:vbX, y:vbY}];

                drawMappedArrow(velCtx, mapVel, vaX, vaY, vbX, vbY, "green", "Vba");
                drawMappedArrow(velCtx, mapVel, 0, 0, vbX, vbY, "blue", "Vb");

                // ACCELERATION
                let An_A_x = -r*w2*w2*Math.cos(th2), An_A_y = -r*w2*w2*Math.sin(th2);
                let At_A_x = -r*a2*Math.sin(th2),   At_A_y = r*a2*Math.cos(th2);
                let A_A_x = An_A_x + At_A_x, A_A_y = An_A_y + At_A_y;

                let a3 = (r*w2*w2*Math.sin(th2) - r*a2*Math.cos(th2) + l*w3*w3*Math.sin(th3)) / (l*Math.cos(th3));
                let Ab_mag = -r*a2*Math.sin(th2) - r*w2*w2*Math.cos(th2) - l*a3*Math.sin(th3) - l*w3*w3*Math.cos(th3);
                
                let An_BA_x = -l*w3*w3*Math.cos(th3), An_BA_y = -l*w3*w3*Math.sin(th3);
                let At_BA_x = -l*a3*Math.sin(th3), At_BA_y = l*a3*Math.cos(th3);

                let p_O = {x:0, y:0};
                let p_An_A = {x: An_A_x, y: An_A_y};
                let p_A = {x: A_A_x, y: A_A_y};
                let p_An_BA = {x: A_A_x + An_BA_x, y: A_A_y + An_BA_y};
                let p_B = {x: Ab_mag, y: 0};

                let accPoints = [p_O, p_An_A, p_A, p_An_BA, p_B];
                let mapAcc = createCoordinateMapper(accCanvas.width, accCanvas.height, accPoints);
                drawSmartGrid(accCtx, accCanvas.width, accCanvas.height, mapAcc);

                drawMappedArrow(accCtx, mapAcc, p_O.x, p_O.y, p_An_A.x, p_An_A.y, "red", "aA^n", [6, 4]);
                drawMappedArrow(accCtx, mapAcc, p_An_A.x, p_An_A.y, p_A.x, p_A.y, "red", "aA^t", [2, 3]);
                drawMappedArrow(accCtx, mapAcc, p_O.x, p_O.y, p_A.x, p_A.y, "red", "aA");
                
                drawMappedArrow(accCtx, mapAcc, p_A.x, p_A.y, p_An_BA.x, p_An_BA.y, "green", "aBA^n", [6, 4]);
                drawMappedArrow(accCtx, mapAcc, p_An_BA.x, p_An_BA.y, p_B.x, p_B.y, "green", "aBA^t", [2, 3]);
                drawMappedArrow(accCtx, mapAcc, p_A.x, p_A.y, p_B.x, p_B.y, "green", "aBA");

                drawMappedArrow(accCtx, mapAcc, p_O.x, p_O.y, p_B.x, p_B.y, "blue", "aB");
            }
        }

        // --- Kinematic graphs logic ---
        function getDerivative(yArray, dx) {
            let dy = [];
            for(let i = 0; i < yArray.length; i++) {
                if(i === 0) dy.push((yArray[1] - yArray[0]) / dx);
                else if(i === yArray.length - 1) dy.push((yArray[i] - yArray[i-1]) / dx);
                else dy.push((yArray[i+1] - yArray[i-1]) / (2 * dx));
            }
            return dy;
        }

        function generatePlots() {
            if(document.getElementById('status').innerText.includes("Error")) return alert("Mechanism broken.");
            let xData = [], yVel = [], yAcc = [], pxArray = [], pyArray = []; 
            let titleVel = "", titleAcc = "", dx = 0.05; 
            let in_w2 = parseFloat(document.getElementById('in_w2').value) || 1;
            let in_a2 = parseFloat(document.getElementById('in_a2').value) || 0;

            if (currentMech === 'fourbar') {
                let { l1, l2, l3, l4 } = getMappedLengths(); 
                let cpL = parseFloat(document.getElementById('CpL').value), cpA = parseFloat(document.getElementById('CpA').value) * (Math.PI / 180);
                for (let t = 0; t <= Math.PI * 2; t += dx) {
                    let ax = l2 * Math.cos(t), ay = l2 * Math.sin(t), dist = Math.sqrt(Math.pow(l1 - ax, 2) + Math.pow(-ay, 2));
                    if (dist <= l3 + l4 && dist >= Math.abs(l3 - l4)) {
                        let phi1 = Math.atan2(-ay, l1 - ax), phi2 = Math.acos((l3*l3 + dist*dist - l4*l4) / (2 * l3 * dist));
                        let th3 = phi1 - phi2;
                        pxArray.push(ax + cpL * Math.cos(th3 + cpA)); pyArray.push(ay + cpL * Math.sin(th3 + cpA)); xData.push(t * (180 / Math.PI)); 
                    }
                }
                
                let v_px_theta = getDerivative(pxArray, dx), v_py_theta = getDerivative(pyArray, dx);
                let a_px_theta = getDerivative(v_px_theta, dx), a_py_theta = getDerivative(v_py_theta, dx);

                for(let i=0; i<xData.length; i++) {
                    let vx = v_px_theta[i] * in_w2, vy = v_py_theta[i] * in_w2;
                    yVel.push(Math.sqrt(vx*vx + vy*vy));
                    let ax_tot = a_px_theta[i] * (in_w2*in_w2) + v_px_theta[i] * in_a2, ay_tot = a_py_theta[i] * (in_w2*in_w2) + v_py_theta[i] * in_a2;
                    yAcc.push(Math.sqrt(ax_tot*ax_tot + ay_tot*ay_tot));
                }
                titleVel = "Coupler Point Velocity Magnitude |Vp|"; titleAcc = "Coupler Point Acceleration Magnitude |Ap|";
                document.getElementById('graph-trace').style.display = "block";
                Plotly.newPlot('graph-trace', [{ x: pxArray, y: pyArray, mode: 'lines', line: {color: 'cyan'} }], { title: "Coupler Exact Value Trace", xaxis: {title: 'X Coordinate'}, yaxis: {title: 'Y Coordinate', scaleanchor: 'x'}, margin: {t:40, b:40, l:40, r:20} });
            } else {
                let r = parseFloat(document.getElementById('R').value), l = parseFloat(document.getElementById('L-sl').value), inv = document.querySelector('input[name="sl-ground-link"]:checked').value;
                document.getElementById('graph-trace').style.display = "none"; 
                let d_array = [];
                for (let t = 0; t <= Math.PI * 2; t += dx) {
                    let d = r * Math.cos(t) + Math.sqrt(l*l - r*r * Math.pow(Math.sin(t), 2));
                    if (inv === "4") d = -r * Math.cos(t) + Math.sqrt(l*l - r*r * Math.pow(Math.sin(t), 2));
                    d_array.push(d); xData.push(t * (180 / Math.PI));
                }
                let d_vel_theta = getDerivative(d_array, dx), d_acc_theta = getDerivative(d_vel_theta, dx);
                for(let i=0; i<xData.length; i++) {
                    yVel.push(Math.abs(d_vel_theta[i] * in_w2)); yAcc.push(Math.abs(d_acc_theta[i] * (in_w2*in_w2) + d_vel_theta[i] * in_a2));
                }
                titleVel = "Relative Slider Linear Velocity Magnitude"; titleAcc = "Relative Slider Linear Acceleration Magnitude";
            }
            document.getElementById('plot-modal').style.display = 'flex';
            Plotly.newPlot('graph-vel', [{ x: xData, y: yVel, mode: 'lines', line: {color: 'blue'} }], { title: titleVel, xaxis: {title: 'Crank Angle (deg)'}, margin: {t:40, b:40, l:40, r:20} });
            Plotly.newPlot('graph-acc', [{ x: xData, y: yAcc, mode: 'lines', line: {color: 'red'} }], { title: titleAcc, xaxis: {title: 'Crank Angle (deg)'}, margin: {t:40, b:40, l:40, r:20} });
        }

        function drawLine(x1, y1, x2, y2, color, pixelWidth) {
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
            ctx.strokeStyle = color; ctx.lineWidth = pixelWidth / currentScale; 
            ctx.lineCap = 'round'; ctx.stroke();
        }
        function drawJoint(x, y, color) {
            ctx.beginPath(); ctx.arc(x, y, 6 / currentScale, 0, Math.PI * 2); 
            ctx.fillStyle = color; ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5 / currentScale; ctx.stroke();
        }

        function animate() {
            if (!isAnimating) { requestAnimationFrame(animate); return; }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let statText = document.getElementById('status').innerText;
            if (statText.includes("Error") || statText.includes("Geometry")) {
                ctx.fillStyle = "#F44336"; ctx.font = "bold 32px Arial"; ctx.textAlign = "center";
                ctx.fillText("⚠️ Impossible Geometry: Cannot Assemble", canvas.width / 2, canvas.height / 2);
                requestAnimationFrame(animate); return;
            }

            let speed = parseFloat(document.getElementById('speed').value) * 0.02;
            let zoomPct = 100 / 100;
            
            ctx.save();
            currentScale = (Math.min(canvas.width, canvas.height) / 40) * zoomPct; 
            ctx.translate(canvas.width / 2 - (currentScale * 5), canvas.height / 2);
            ctx.scale(currentScale, -currentScale); 

            if (tracePath.length > 0) {
                ctx.beginPath();
                for (let i = 0; i < tracePath.length; i++) {
                    if (i === 0) ctx.moveTo(tracePath[i].x, tracePath[i].y);
                    else {
                        let gap = Math.hypot(tracePath[i].x - tracePath[i-1].x, tracePath[i].y - tracePath[i-1].y);
                        if (gap > 5) ctx.moveTo(tracePath[i].x, tracePath[i].y);
                        else ctx.lineTo(tracePath[i].x, tracePath[i].y);
                    }
                }
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.8)';
                ctx.setLineDash([5 / currentScale, 5 / currentScale]); ctx.lineWidth = 2.5 / currentScale; 
                ctx.stroke(); ctx.setLineDash([]);
            }

            if (currentMech === 'fourbar') {
                let { l1, l2, l3, l4, id1, id2, id3, id4, shortestId } = getMappedLengths(); 
                let cpL = parseFloat(document.getElementById('CpL').value);
                let cpA = parseFloat(document.getElementById('CpA').value) * (Math.PI / 180);

                let currentDist = Math.hypot(l1 - l2 * Math.cos(theta), -l2 * Math.sin(theta));
                if (currentDist > l3 + l4 || currentDist < Math.abs(l3 - l4)) {
                    if (validAngles.length > 0) theta = validAngles[Math.floor(validAngles.length / 2)];
                }
                let nextTheta = theta + (speed * direction);
                let nAx = l2 * Math.cos(nextTheta), nAy = l2 * Math.sin(nextTheta);
                let nDist = Math.hypot(l1 - nAx, -nAy);
                if (nDist > l3 + l4 || nDist < Math.abs(l3 - l4)) {
                    direction *= -1; nextTheta = theta + (speed * direction);
                }
                theta = nextTheta;

                let ax = l2 * Math.cos(theta), ay = l2 * Math.sin(theta);
                let dist = Math.hypot(l1 - ax, -ay);
                if (dist <= l3 + l4 && dist >= Math.abs(l3 - l4)) {
                    let phi1 = Math.atan2(-ay, l1 - ax), phi2 = Math.acos((l3*l3 + dist*dist - l4*l4) / (2 * l3 * dist));
                    let th3 = phi1 - phi2;
                    let bx = ax + l3 * Math.cos(th3), by = ay + l3 * Math.sin(th3);
                    let px = ax + cpL * Math.cos(th3 + cpA), py = ay + cpL * Math.sin(th3 + cpA);

                    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.lineTo(px, py); ctx.closePath();
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.3)'; ctx.fill();

                    const getColor = (id) => id === 1 ? '#9E9E9E' : id === 2 ? '#FF5252' : id === 3 ? '#4CAF50' : '#2196F3';
                    const drawSpecialLine = (x1, y1, x2, y2, id) => {
                        if (id === shortestId) {
                            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
                            ctx.strokeStyle = 'rgba(255, 235, 59, 0.6)'; ctx.lineWidth = 18 / currentScale; ctx.lineCap = 'round'; ctx.stroke();
                        }
                        drawLine(x1, y1, x2, y2, getColor(id), 8);
                    };

                    drawSpecialLine(0, 0, l1, 0, id1); drawSpecialLine(0, 0, ax, ay, id2);      
                    drawSpecialLine(ax, ay, bx, by, id3); drawSpecialLine(l1, 0, bx, by, id4);     

                    drawJoint(0, 0, getColor(id1)); drawJoint(l1, 0, getColor(id1));
                    drawJoint(ax, ay, getColor(id2)); drawJoint(bx, by, getColor(id4));
                    drawJoint(px, py, '#00FFFF');
                }
            } else if (currentMech === 'slider') {
                let r = parseFloat(document.getElementById('R').value), l = parseFloat(document.getElementById('L-sl').value), inv = document.querySelector('input[name="sl-ground-link"]:checked').value;
                theta = theta + (speed * direction);
                let p12, p23, p34, trackAngle;

                if (inv === "1") {
                    p12 = {x: 0, y: 0}; p23 = {x: r * Math.cos(theta), y: r * Math.sin(theta)};
                    let d = r * Math.cos(theta) + Math.sqrt(l*l - r*r * Math.pow(Math.sin(theta), 2));
                    p34 = {x: d, y: 0}; trackAngle = 0;
                } else if (inv === "2") {
                    p12 = {x: 0, y: 0}; p23 = {x: r, y: 0};
                    let d = r * Math.cos(theta) + Math.sqrt(l*l - r*r * Math.pow(Math.sin(theta), 2));
                    p34 = {x: d * Math.cos(theta), y: d * Math.sin(theta)}; trackAngle = theta;
                } else if (inv === "3") {
                    p23 = {x: 0, y: 0}; p34 = {x: l, y: 0};
                    p12 = {x: r * Math.cos(theta), y: r * Math.sin(theta)};
                    trackAngle = Math.atan2(p34.y - p12.y, p34.x - p12.x);
                } else if (inv === "4") {
                    p34 = {x: 0, y: 0};
                    let d = -r * Math.cos(theta) + Math.sqrt(l*l - r*r * Math.pow(Math.sin(theta), 2));
                    p12 = {x: d, y: 0}; p23 = {x: d + r * Math.cos(theta), y: r * Math.sin(theta)};
                    trackAngle = 0;
                }

                const drawSliderLink = (x1, y1, x2, y2, color, isFixed) => {
                    if (isFixed) {
                        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
                        ctx.strokeStyle = 'rgba(255, 235, 59, 0.6)'; ctx.lineWidth = 18 / currentScale; ctx.lineCap = 'round'; ctx.stroke();
                    }
                    drawLine(x1, y1, x2, y2, color, 8);
                };

                let tL_start = - (l + r) * 1.5; let tL_end = (l + r) * 1.5;
                if (inv === "3") { tL_start = -2; tL_end = Math.hypot(p34.x - p12.x, p34.y - p12.y) + r + 2; }
                let tx1 = p12.x + tL_start * Math.cos(trackAngle), ty1 = p12.y + tL_start * Math.sin(trackAngle);
                let tx2 = p12.x + tL_end * Math.cos(trackAngle), ty2 = p12.y + tL_end * Math.sin(trackAngle);

                drawSliderLink(tx1, ty1, tx2, ty2, '#9E9E9E', inv === "1"); 
                drawSliderLink(p12.x, p12.y, p23.x, p23.y, '#FF5252', inv === "2"); 
                drawSliderLink(p23.x, p23.y, p34.x, p34.y, '#4CAF50', inv === "3"); 

                ctx.save(); ctx.translate(p34.x, p34.y); ctx.rotate(trackAngle);
                let blockW = 4, blockH = 2.5;
                if (inv === "4") {
                    let glow = 6 / currentScale; ctx.fillStyle = 'rgba(255, 235, 59, 0.6)';
                    ctx.fillRect(-blockW/2 - glow/2, -blockH/2 - glow/2, blockW + glow, blockH + glow);
                }
                ctx.fillStyle = 'rgba(33, 150, 243, 0.7)'; ctx.fillRect(-blockW/2, -blockH/2, blockW, blockH);
                ctx.strokeStyle = '#2196F3'; ctx.lineWidth = 2.5 / currentScale; ctx.strokeRect(-blockW/2, -blockH/2, blockW, blockH);
                ctx.restore();

                drawJoint(p12.x, p12.y, '#9E9E9E'); drawJoint(p23.x, p23.y, '#FF5252'); drawJoint(p34.x, p34.y, '#4CAF50'); 
            }

            ctx.restore(); requestAnimationFrame(animate); 
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
